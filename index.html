<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时空规划调度系统</title>
    <link rel="stylesheet" href="times.css">
</head>
<body>
    <div class="container">
        <!-- 顶部区域 -->
        <div class="top-section">
            <!-- 左上角：日历 -->
            <div class="calendar-section">
                <div class="calendar-header">
                    <button id="prevMonth" class="nav-btn">&lt;</button>
                    <h2 id="currentMonth"></h2>
                    <button id="nextMonth" class="nav-btn">&gt;</button>
                </div>
                <div class="calendar-grid">
                    <div class="calendar-day-header">日</div>
                    <div class="calendar-day-header">一</div>
                    <div class="calendar-day-header">二</div>
                    <div class="calendar-day-header">三</div>
                    <div class="calendar-day-header">四</div>
                    <div class="calendar-day-header">五</div>
                    <div class="calendar-day-header">六</div>
                    <div id="calendarDays"></div>
                </div>
            </div>
            
            <!-- 右上角：时钟、天气、闹钟、AI 助手区域 -->
            <div class="reserved-section">
                <!-- 左侧：时钟、天气、闹钟 -->
                <div class="panel-left">
                    <!-- 数显时钟 -->
                    <div class="digital-clock" id="digitalClock">00:00:00</div>
                    <!-- 天气卡片 -->
                    <div class="weather-card" id="weatherCard">
                        <div class="weather-main-row">
                            <div class="weather-left">
                                <div class="weather-temp" id="weatherTemp">--°C</div>
                                <div class="weather-icon-desc">
                                    <span class="weather-icon" id="weatherIcon"></span>
                                    <span class="weather-desc" id="weatherDesc">点击获取天气</span>
                                </div>
                            </div>
                            <div class="weather-right">
                                <div class="weather-locate-row">
                                    <span class="weather-province" id="weatherProvince">--</span>
                                    <span class="weather-city" id="weatherCity">--</span>
                                </div>
                                <div class="weather-district" id="weatherDistrict">--</div>
                                <div class="weather-detail" id="weatherDetail">--</div>
                            </div>
                        </div>
                        <div class="weather-date" id="currentDate">----年--月--日 星期-</div>
                        <button id="getLocationBtn" class="weather-locate-btn" title="获取天气"></button>
                    </div>
                    <!-- 闹钟列表 -->
                    <div class="alarm-list-container">
                        <div class="alarm-header-row">
                            <h3>闹钟</h3>
                            <button class="alarm-add-btn" id="addAlarmBtn" title="添加闹钟">+</button>
                        </div>
                        <div id="alarmNextInfo" class="alarm-next-info"></div>
                        <div class="alarm-list" id="alarmList"></div>
                    </div>
                </div>
                <!-- 右侧：AI 智能助手 -->
                <div class="ai-assistant-embedded">
                    <div class="ai-header">
                        <div class="ai-title">
                            <span class="ai-icon"></span>
                            <h3>AI 助手</h3>
                            <span class="ai-status" id="aiStatus">●</span>
                        </div>
                        <div class="ai-actions">
                            <button class="ai-action-btn" id="aiSummaryBtn" title="生成摘要"></button>
                            <button class="ai-action-btn" id="aiSuggestBtn" title="获取建议">💡</button>
                        </div>
                    </div>
                    <div class="ai-messages" id="aiChatMessages">
                        <div class="ai-message ai-assistant">
                            <div class="ai-message-content">
                                <p>你好！我是你的智能助手。在设置中配置 API Key 后即可使用。</p>
                            </div>
                        </div>
                    </div>
                    <div class="ai-quick-actions">
                        <button class="ai-quick-btn" data-question="今天有什么安排？">今日安排</button>
                        <button class="ai-quick-btn" data-question="这周忙不忙？">时间分析</button>
                        <button class="ai-quick-btn" data-question="有没有时间冲突？">冲突检测</button>
                    </div>
                    <div class="ai-input-area">
                        <textarea class="ai-input" id="aiChatInput" placeholder="问我任何问题..." rows="1"></textarea>
                        <button class="ai-send-btn" id="aiSendBtn" title="发送">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 下方：甘特图区域 -->
        <div class="gantt-section">
            <div class="gantt-header">
                <h2 id="ganttTitle">周视图</h2>
                <div class="gantt-controls">
                    <div class="view-modes">
                        <button class="view-btn" data-view="day">日</button>
                        <button class="view-btn active" data-view="week">周</button>
                        <button class="view-btn" data-view="month">月</button>
                        <button class="view-btn" data-view="year">年</button>
                    </div>
                    <button id="addEventBtn" class="btn">添加事件</button>
                    <button id="exportBtn" class="btn">导出 Excel</button>
                    <button id="importBtn" class="btn">导入 Excel</button>
                    <button id="settingsBtn" class="btn">设置</button>
                </div>
            </div>
            
            <div class="gantt-timeline">
                <div class="gantt-labels"></div>
                <div class="gantt-tag-column" id="ganttTagColumn"></div>
                <div class="gantt-chart">
                    <div class="gantt-chart-inner">
                        <div class="gantt-timeline-bar"></div>
                        <div class="gantt-days-header"></div>
                        <div class="gantt-events"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 添加/编辑事件模态框 -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modalTitle">添加事件</h3>
            <form id="eventForm">
                <div class="form-group">
                    <label for="eventName">事件名称：</label>
                    <input type="text" id="eventName" required>
                </div>
                <div class="form-group">
                    <label for="eventDesc">事件描述：</label>
                    <textarea id="eventDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                        <input type="checkbox" id="eventRecurring" style="width:18px;height:18px;cursor:pointer;">
                        <span>设置为周期性事件</span>
                    </label>
                </div>
                <div id="recurringOptions" style="display:none;">
                    <div class="form-group">
                        <label for="recurringMode">循环模式：</label>
                        <select id="recurringMode">
                            <option value="weekly">按周循环</option>
                            <option value="monthly">按月循环</option>
                            <option value="custom">自定义日期范围</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" id="normalTimeGroup">
                    <label for="eventStart">开始时间：</label>
                    <input type="datetime-local" id="eventStart" required>
                </div>
                <div class="form-group" id="normalTimeGroupEnd">
                    <label for="eventEnd">结束时间：</label>
                    <input type="datetime-local" id="eventEnd" required>
                </div>
                <div id="recurringTimeGroup" style="display:none;">
                    <div class="form-group">
                        <label for="recurringStartDate">开始日期：</label>
                        <input type="date" id="recurringStartDate">
                    </div>
                    <div class="form-group" id="recurringEndDateField" style="display:none;">
                        <label for="recurringEndDate">结束日期：</label>
                        <input type="date" id="recurringEndDate">
                    </div>
                    <div class="form-group" style="display:flex;gap:12px;">
                        <div style="flex:1;">
                            <label for="recurringStartTime">开始时段：</label>
                            <input type="time" id="recurringStartTime" style="width:100%;">
                        </div>
                        <div style="flex:1;">
                            <label for="recurringEndTime">结束时段：</label>
                            <input type="time" id="recurringEndTime" style="width:100%;">
                        </div>
                    </div>
                    <div id="crossDayHint" style="display:none;color:#ff9800;font-size:0.85rem;margin-top:-8px;margin-bottom:8px;"> 结束时段早于开始时段，事件将跨天</div>
                </div>
                <div class="form-group">
                    <label for="eventUrgency">紧急程度：<span id="urgencyValue">50</span>%</label>
                    <input type="range" id="eventUrgency" min="0" max="100" value="50">
                    <div id="urgencyColorPreview" style="width:100%;height:12px;border-radius:6px;margin-top:6px;"></div>
                </div>
                <div class="form-group">
                    <label for="eventTag">标签：</label>
                    <input type="text" id="eventTag" placeholder="输入标签名称，相同标签的事件将合并到同一行">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">保存</button>
                    <button type="button" id="cancelEventBtn" class="btn btn-secondary">取消</button>
                    <button type="button" id="deleteEventBtn" class="btn btn-danger" style="display:none;">删除</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 设置模态框 -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>设置</h3>
            
            <!-- 主题颜色设置 -->
            <div class="settings-section">
                <div class="settings-section-header collapsed" data-target="themeSection">
                    <span>主题颜色设置</span>
                    <span class="collapse-arrow">▼</span>
                </div>
                <div class="settings-section-body collapsed" id="themeSection">
                    <div class="form-group">
                        <label for="btnColor">按钮主题颜色：</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="btnColor" value="#4CAF50" style="width: 200px; height: 45px; cursor: pointer; border: 2px solid #ccc; border-radius: 6px; padding: 3px;">
                        </div>
                        <p class="color-hint">此颜色将应用于网页中所有按钮（标签按钮除外）</p>
                    </div>
                    <div class="form-actions" style="margin-top: 15px;">
                        <button type="button" class="btn" id="saveBtnColorBtn">保存颜色</button>
                    </div>
                </div>
            </div>
            
            <!-- 背景设置 -->
            <div class="settings-section">
                <div class="settings-section-header collapsed" data-target="bgSection">
                    <span> 背景设置</span>
                    <span class="collapse-arrow">▼</span>
                </div>
                <div class="settings-section-body collapsed" id="bgSection">
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-content" id="uploadContent">
                            <div class="upload-icon">📁</div>
                            <p>拖放图片到此处，或点击选择文件</p>
                            <p class="upload-hint">支持 JPG、PNG、WEBP 格式</p>
                        </div>
                        <div class="preview-content" id="previewContent" style="display:none;">
                            <img id="previewImage" src="" alt="预览">
                            <div class="preview-actions">
                                <button class="btn" id="confirmUpload">确认使用</button>
                                <button class="btn btn-secondary" id="cancelUpload">取消</button>
                            </div>
                        </div>
                        <div class="upload-progress" id="uploadProgress" style="display:none;">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                            <p id="progressText">处理中...</p>
                        </div>
                    </div>
                    <div class="bg-style-options" id="bgStyleOptions" style="display:none;">
                        <label>显示模式：</label>
                        <select id="bgSizeSelect">
                            <option value="cover">覆盖（全屏填充）</option>
                            <option value="contain">适应（完整显示）</option>
                            <option value="100% 100%">拉伸</option>
                            <option value="auto">原始大小</option>
                        </select>
                        <label>位置：</label>
                        <select id="bgPositionSelect">
                            <option value="center">居中</option>
                            <option value="top">顶部</option>
                            <option value="bottom">底部</option>
                            <option value="left">左侧</option>
                            <option value="right">右侧</option>
                        </select>
                        <label>重复：</label>
                        <select id="bgRepeatSelect">
                            <option value="no-repeat">不重复</option>
                            <option value="repeat">平铺</option>
                            <option value="repeat-x">水平平铺</option>
                            <option value="repeat-y">垂直平铺</option>
                        </select>
                    </div>
                    <input type="file" id="bgFileInput" accept="image/jpeg,image/png,image/webp" hidden>
                    <div style="margin-top: 10px;">
                        <button class="btn btn-danger" id="removeBgBtn" style="display:none;">移除背景图片</button>
                    </div>
                    <div class="form-actions" style="margin-top: 15px;">
                        <button type="button" class="btn" id="saveBgBtn">保存背景设置</button>
                        <button type="button" class="btn btn-secondary" id="cancelSettingsBtn">关闭</button>
                    </div>
                </div>
            </div>
            
            <!-- 铃声设置 -->
            <div class="settings-section">
                <div class="settings-section-header collapsed" data-target="ringtoneSection">
                    <span>铃声设置</span>
                    <span class="collapse-arrow">▼</span>
                </div>
                <div class="settings-section-body collapsed" id="ringtoneSection">
                    <div class="ringtone-options">
                        <label>选择铃声：</label>
                        <div class="ringtone-list" id="ringtoneList"></div>
                    </div>
                    <div class="ringtone-volume">
                        <label>音量：<span id="volumeValue">80</span>%</label>
                        <input type="range" id="volumeSlider" min="0" max="100" value="80">
                    </div>
                    <div class="ringtone-duration">
                        <label>持续时间：</label>
                        <select id="durationSelect">
                            <option value="5">5 秒</option>
                            <option value="10">10 秒</option>
                            <option value="15" selected>15 秒</option>
                            <option value="30">30 秒</option>
                            <option value="60">60 秒</option>
                            <option value="0">直到手动关闭</option>
                        </select>
                    </div>
                    <div class="ringtone-fadein">
                        <label class="fadein-check">
                            <input type="checkbox" id="fadeInToggle" checked>
                            <span>渐强铃声（从低音量逐渐增加）</span>
                        </label>
                    </div>
                    <div class="ringtone-override">
                        <label class="override-check">
                            <input type="checkbox" id="overrideMuteToggle" checked>
                            <span>覆盖系统静音模式</span>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- AI 模型配置 -->
            <div class="settings-section">
                <div class="settings-section-header collapsed" data-target="aiConfigSection">
                    <span>AI 模型配置</span>
                    <span class="collapse-arrow">▼</span>
                </div>
                <div class="settings-section-body collapsed" id="aiConfigSection">
                    <div class="ai-config-group">
                        <label for="aiProvider">AI 提供商：</label>
                        <select id="aiProvider">
                            <option value="openai">OpenAI (GPT)</option>
                            <option value="anthropic">Anthropic (Claude)</option>
                            <option value="qwen">通义千问 (阿里云)</option>
                        </select>
                    </div>
                    <div class="ai-config-group">
                        <label for="aiApiKey">API Key：</label>
                        <input type="password" id="aiApiKey" placeholder="输入你的 API Key">
                        <small class="ai-config-hint">API Key 仅保存在本地浏览器中，不会上传到服务器</small>
                    </div>
                    <div class="ai-config-group">
                        <label for="aiModel">模型名称：</label>
                        <input type="text" id="aiModel" placeholder="例如：gpt-4, claude-3-sonnet-20240229">
                    </div>
                    <div class="ai-config-group">
                        <label for="aiBaseUrl">API 地址（可选）：</label>
                        <input type="text" id="aiBaseUrl" placeholder="例如：https://api.openai.com/v1">
                    </div>
                    <div class="form-actions" style="margin-top: 15px;">
                        <button type="button" class="btn" id="saveAiConfigBtn">保存配置</button>
                        <button type="button" class="btn btn-secondary" id="testAiConfigBtn">测试连接</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 闹钟编辑弹窗 -->
    <div id="alarmModal" class="modal">
        <div class="modal-content alarm-modal-content">
            <span class="close" id="alarmModalCancel">&times;</span>
            <h3 id="alarmModalTitle">添加闹钟</h3>
            <div class="alarm-modal-time-picker">
                <input type="time" id="alarmModalTime" value="07:00">
            </div>
            <div class="alarm-modal-weekdays">
                <label>重复：</label>
                <div class="weekday-checkboxes">
                    <label class="weekday-check">
                        <input type="checkbox" class="alarm-modal-weekday" data-day="1">
                        <span>周一</span>
                    </label>
                    <label class="weekday-check">
                        <input type="checkbox" class="alarm-modal-weekday" data-day="2">
                        <span>周二</span>
                    </label>
                    <label class="weekday-check">
                        <input type="checkbox" class="alarm-modal-weekday" data-day="3">
                        <span>周三</span>
                    </label>
                    <label class="weekday-check">
                        <input type="checkbox" class="alarm-modal-weekday" data-day="4">
                        <span>周四</span>
                    </label>
                    <label class="weekday-check">
                        <input type="checkbox" class="alarm-modal-weekday" data-day="5">
                        <span>周五</span>
                    </label>
                    <label class="weekday-check">
                        <input type="checkbox" class="alarm-modal-weekday" data-day="6">
                        <span>周六</span>
                    </label>
                    <label class="weekday-check">
                        <input type="checkbox" class="alarm-modal-weekday" data-day="0">
                        <span>周日</span>
                    </label>
                </div>
            </div>
            <div class="alarm-modal-actions">
                <button class="btn btn-danger" id="alarmModalDelete" style="display:none;">删除</button>
                <button class="btn" id="alarmModalSave">保存</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="times.js"></script>
    
    <!-- 隐藏的文件输入框，用于导入 Excel -->
    <input type="file" id="importFileInput" accept=".xlsx,.xls,.csv" style="display:none;">
</body>
</html>
