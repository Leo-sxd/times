[build]
  functions = "functions"
  publish = "site"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["openai", "@anthropic-ai/sdk", "axios"]

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/suggestions"
  to = "/.netlify/functions/suggestions"
  status = 200

[[redirects]]
  from = "/api/summary"
  to = "/.netlify/functions/summary"
  status = 200

[[redirects]]
  from = "/api/test"
  to = "/.netlify/functions/test"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/ping"
  to = "/.netlify/functions/ping"
  status = 200
